<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AdminPro | Gestión de Usuarios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="dashboard-container">
    <aside class="sidebar">
      <div class="logo">Admin<span>Pro</span></div>
      <nav>
        <a href="#" class="active">👥 Usuarios</a>
        <a href="#">📊 Reportes</a>
        <a href="#">⚙️ Configuración</a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="stats-grid">
        <div class="stat-card">
          <span class="stat-label">Total Usuarios</span>
          <div class="stat-value" id="total-count">0</div>
        </div>
        <div class="stat-card">
          <span class="stat-label">Ciudades Activas</span>
          <div class="stat-value" id="city-count">0</div>
        </div>  
        <div class="stat-card">
          <span class="stat-label">Promedio Edad</span>
          <div class="stat-value" id="avg-age">0</div>
        </div>
      </header>

      <div class="content-grid">
        <section class="card form-section">
          <div class="card-header">
            <h3>Registro de Perfil</h3>
          </div>
          <form id="usuario-form">
            <input type="hidden" id="usuario-id" />
            <div class="input-group">
              <label>Nombre Completo</label>
              <input type="text" id="name" placeholder="Ej. Cristian Diaz" required />
            </div>
            <div class="input-row">
              <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" required />
              </div>
              <div class="input-group">
                <label>Edad</label>
                <input type="number" id="edad" />
              </div>
            </div>
            <div class="input-group">
              <label>Ciudad</label>
              <input type="text" id="ciudad" />
            </div>
            <div class="input-group">
              <label>Biografía</label>
              <textarea id="biografia" rows="3"></textarea>
            </div>
            <div class="input-group">
              <label class="custom-file-upload">
                <input type="file" id="foto" accept="image/*"/>
                Subir Foto de Perfil
              </label>
            </div>
            <button type="submit" class="btn-submit">Guardar Cambios</button>
          </form>
        </section>

        <section class="card table-section">
          <div class="table-header">
            <h3>Directorio de Usuarios</h3>
            <input type="text" id="search-input" placeholder="Buscar por nombre o email..." />
          </div>
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Usuario</th>
                  <th>Ubicación</th>
                  <th>Biografía</th>
                  <th>Acciones</th>
                </tr>
              </thead>
              <tbody id="usuarios-tbody"></tbody>
            </table>
          </div>
        </section>
      </div>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
