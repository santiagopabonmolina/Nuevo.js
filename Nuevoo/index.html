<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Glassmorphism Login Form</title>
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>  
  <link rel="stylesheet" href="./style.css">
</head>
<body>
<div class="wrapper">
  <form id="loginForm">
    <h1>Login</h1>

    <div class="input-box">
      <input type="text" id="usuario" placeholder="Username" >
      <i class='bx bxs-user'></i>
    </div>

    <div class="input-box">
      <input type="password" id="password" placeholder="Password"   >
      <i class='bx bxs-lock-alt'></i>
    </div>

    <div class="remember-forgot">
      <label><input type="checkbox">Remember me</label>
      <a href="forgot-password.html">Forgot password?</a>
    </div>

    <button type="submit" class="btn" id="loginBtn">Login</button>

    <div class="register-link">
      <p>Don't have an account? <a href="register.html">Register</a></p>
    </div>

    <!-- Agregamos elementos para mensajes -->
    <div id="estado" style="margin-top: 10px;">🔘 Esperando ingreso...</div>
    <div id="resultado" style="margin-top: 5px;"></div>

  </form>
</div>

<script src="script.js"></script>
</body>
</html>
