<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <link rel="stylesheet" href="./contraseña.css">
</head>
<body>
  <div class="wrapper">
    <form id="forgotForm">
      <h1>Reset Password</h1>

      <div class="input-box">
        <input type="email" id="emailReset" placeholder="Enter your email">
        <i class='bx bxs-envelope'></i>
      </div>

      <button type="submit" class="btn">Send Reset Link</button>

      <div class="register-link">
        <p>Remember your password? <a href="index.html">Login</a></p>
      </div>

      <div id="estado" style="margin-top: 10px;"></div>
      <div id="resultado" style="margin-top: 5px;"></div>
    </form>
  </div>

  <script src="./contraseña.js"></script>
</body>
</html>
